name: Build PrusaSlicer CLI (ARM64)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            arm64v8/ubuntu:24.04 bash -c '
              set -e

              # System deps for building deps + PrusaSlicer
              apt-get update
              apt-get install -y \
                build-essential cmake git pkg-config m4 gettext curl \
                libgl-dev libgtk-3-dev libdbus-1-dev \
                autoconf libtool texinfo

              # 1. Build PrusaSlicer bundled dependencies
              mkdir -p deps/build && cd deps/build
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DDEP_WX_GTK3=ON
              make -j$(nproc)
              DESTDIR=$(pwd)/destdir
              cd /src

              # 2. Build PrusaSlicer CLI
              mkdir -p build && cd build
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="$(pwd)/../deps/build/destdir/usr/local" \
                -DSLIC3R_GUI=OFF \
                -DSLIC3R_STATIC=ON \
                -DSLIC3R_BUILD_TESTS=OFF

              make -j$(nproc) PrusaSlicer

              strip src/PrusaSlicer || true
              mkdir -p artifact
              cp src/PrusaSlicer artifact/prusa-slicer
              chmod +x artifact/prusa-slicer
              cd artifact
              tar czf prusa-slicer-cli-linux-arm64.tar.gz prusa-slicer
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prusa-slicer-cli-linux-arm64
          path: build/artifact/prusa-slicer-cli-linux-arm64.tar.gz
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.9.4-fix-merge
          name: "PrusaSlicer 2.9.4 — Fix --merge segfault"
          body: |
            PrusaSlicer 2.9.4 CLI-only builds for Linux.

            **Fix applied:** `&&` → `||` in `src/CLI/ProcessTransform.cpp` line 51.
            Fixes segfault when using `--merge` flag ([upstream #14548](https://github.com/prusa3d/PrusaSlicer/issues/14548), [PR #15235](https://github.com/prusa3d/PrusaSlicer/pull/15235)).

            **Available binaries:**
            - `prusa-slicer-cli-linux-x64.tar.gz` — x86_64
            - `prusa-slicer-cli-linux-arm64.tar.gz` — ARM64

            ```bash
            tar xzf prusa-slicer-cli-linux-<arch>.tar.gz
            sudo cp prusa-slicer /usr/local/bin/prusa-slicer
            ```
          files: build/artifact/prusa-slicer-cli-linux-arm64.tar.gz
          draft: false
          prerelease: false
