name: Build PrusaSlicer CLI (ARM64)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            arm64v8/ubuntu:24.04 bash -c '
              set -e
              apt-get update
              apt-get install -y \
                build-essential cmake git pkg-config m4 gettext \
                libboost-all-dev libcurl4-openssl-dev \
                libeigen3-dev libexpat1-dev \
                libgmp-dev libmpfr-dev libtbb-dev \
                libcereal-dev zlib1g-dev \
                libnlopt-dev libnlopt-cxx-dev \
                libopenvdb-dev libblosc-dev \
                libcgal-dev

              mkdir -p build && cd build
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DSLIC3R_GUI=OFF \
                -DSLIC3R_STATIC=OFF

              make -j$(nproc) PrusaSlicer

              strip src/PrusaSlicer || true
              mkdir -p artifact
              cp src/PrusaSlicer artifact/prusa-slicer
              chmod +x artifact/prusa-slicer
              cd artifact
              tar czf prusa-slicer-cli-linux-arm64.tar.gz prusa-slicer
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prusa-slicer-cli-linux-arm64
          path: build/artifact/prusa-slicer-cli-linux-arm64.tar.gz
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.9.2-fix-merge
          name: "PrusaSlicer 2.9.2 — Fix --merge segfault (ARM64 CLI)"
          body: |
            PrusaSlicer 2.9.2 CLI-only build for Linux ARM64.

            **Fix applied:** `&&` → `||` in `src/CLI/ProcessTransform.cpp` line 51.
            Fixes segfault when using `--merge` flag ([upstream #14548](https://github.com/prusa3d/PrusaSlicer/issues/14548), [PR #15235](https://github.com/prusa3d/PrusaSlicer/pull/15235)).

            ```bash
            tar xzf prusa-slicer-cli-linux-arm64.tar.gz
            sudo cp prusa-slicer /usr/local/bin/prusa-slicer
            ```
          files: build/artifact/prusa-slicer-cli-linux-arm64.tar.gz
          draft: false
          prerelease: false
