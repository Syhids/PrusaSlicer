name: Build PrusaSlicer CLI (x86_64)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git pkg-config m4 gettext curl \
            libgl-dev libgtk-3-dev libdbus-1-dev \
            autoconf libtool texinfo \
            libgmp-dev libmpfr-dev

      - name: Build PrusaSlicer bundled dependencies
        run: |
          mkdir -p deps/build && cd deps/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEP_WX_GTK3=ON \
            "-DPrusaSlicer_deps_PLATFORM_PACKAGES=GMP;MPFR"
          make -j$(nproc)

      - name: Build PrusaSlicer CLI
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(pwd)/../deps/build/destdir/usr/local" \
            -DSLIC3R_GUI=OFF \
            -DSLIC3R_STATIC=ON \
            -DSLIC3R_BUILD_TESTS=OFF
          make -j$(nproc) PrusaSlicer

      - name: Package artifact
        run: |
          strip build/src/prusa-slicer || true
          mkdir -p build/artifact
          cp build/src/prusa-slicer build/artifact/prusa-slicer
          chmod +x build/artifact/prusa-slicer
          cd build/artifact
          tar czf prusa-slicer-cli-linux-x64.tar.gz prusa-slicer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prusa-slicer-cli-linux-x64
          path: build/artifact/prusa-slicer-cli-linux-x64.tar.gz
          retention-days: 90

      - name: Update Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.9.4-fix-merge
          name: "PrusaSlicer 2.9.4 — Fix --merge segfault"
          body: |
            PrusaSlicer 2.9.4 CLI-only build for Linux x86_64.

            **Fix applied:** `&&` → `||` in `src/CLI/ProcessTransform.cpp` line 51.
            Fixes segfault when using `--merge` flag ([upstream #14548](https://github.com/prusa3d/PrusaSlicer/issues/14548), [PR #15235](https://github.com/prusa3d/PrusaSlicer/pull/15235)).

            ```bash
            tar xzf prusa-slicer-cli-linux-x64.tar.gz
            sudo cp prusa-slicer /usr/local/bin/prusa-slicer
            ```
          files: build/artifact/prusa-slicer-cli-linux-x64.tar.gz
          draft: false
          prerelease: false
